<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Який ти мем? - тест</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1A1726; --paper:#F1EEFA; --card:#FFFFFF;
    --coral:#FF5470; --indigo:#5B5FEF; --yellow:#FFC93C; --mint:#2DD4A7;
    --shadow:6px 6px 0 var(--ink); --shadow-sm:4px 4px 0 var(--ink); --radius:22px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--paper);
    min-height:100dvh;display:flex;align-items:flex-start;justify-content:center;
    padding:24px 16px 64px;overflow-x:hidden;position:relative;
  }
  .blob{position:fixed;border-radius:50%;filter:blur(38px);opacity:.45;z-index:-1;animation:float 9s ease-in-out infinite;}
  .blob.b1{width:240px;height:240px;background:var(--coral);top:-60px;left:-70px;}
  .blob.b2{width:200px;height:200px;background:var(--indigo);bottom:-50px;right:-60px;animation-delay:-3s;}
  .blob.b3{width:160px;height:160px;background:var(--yellow);top:40%;right:-50px;animation-delay:-5s;}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-22px)}}

  .stage{width:100%;max-width:600px;}
  .screen{display:none;animation:fadeUp .4s ease both;}
  .screen.active{display:block;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  .panel{background:var(--card);border:3px solid var(--ink);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px 24px;}

  .eyebrow{display:inline-block;font-weight:700;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;background:var(--yellow);border:2px solid var(--ink);border-radius:999px;padding:6px 14px;margin-bottom:18px;}
  h1{font-family:'Unbounded',sans-serif;font-weight:900;line-height:1.02;font-size:clamp(2.1rem,8vw,3.4rem);margin-bottom:14px;letter-spacing:-.01em;}
  .lead{font-size:1.05rem;line-height:1.55;color:#3b3650;margin-bottom:26px;max-width:46ch;}

  .btn{font-family:'Inter',sans-serif;font-weight:700;font-size:1rem;border:3px solid var(--ink);border-radius:16px;cursor:pointer;padding:15px 22px;background:var(--card);color:var(--ink);box-shadow:var(--shadow-sm);transition:transform .12s ease,box-shadow .12s ease;-webkit-tap-highlight-color:transparent;}
  .btn:hover{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink);}
  .btn:active{transform:translate(4px,4px);box-shadow:none;}
  .btn:focus-visible{outline:3px solid var(--indigo);outline-offset:3px;}
  .btn-primary{background:var(--coral);color:#fff;font-size:1.1rem;width:100%;}
  .btn-row{display:flex;flex-wrap:wrap;gap:12px;margin-top:24px;}
  .btn-row .btn{flex:1 1 auto;}

  .quiz-top{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
  .iconbtn{width:42px;height:42px;flex:none;border:3px solid var(--ink);border-radius:12px;background:#fff;font-size:1.2rem;cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .12s ease,box-shadow .12s ease;line-height:1;}
  .iconbtn:hover{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink);}
  .iconbtn:focus-visible{outline:3px solid var(--indigo);outline-offset:3px;}
  .iconbtn[hidden]{visibility:hidden;}
  .counter{font-weight:700;font-size:.9rem;white-space:nowrap;}
  .bar{flex:1;height:14px;border:3px solid var(--ink);border-radius:999px;background:#fff;overflow:hidden;}
  .bar-fill{height:100%;width:0;background:var(--indigo);border-radius:999px;transition:width .35s ease;}

  .question{font-family:'Unbounded',sans-serif;font-weight:700;font-size:1.35rem;line-height:1.2;margin:6px 4px 22px;}
  .options{display:grid;gap:12px;}
  .option{text-align:left;font-size:1.02rem;font-weight:600;line-height:1.4;border:3px solid var(--ink);border-radius:16px;background:#fff;color:var(--ink);padding:16px 18px;cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .12s ease,box-shadow .12s ease,background .12s ease;display:flex;gap:12px;align-items:center;-webkit-tap-highlight-color:transparent;}
  .option .emo{font-size:1.5rem;flex:none;}
  .option:hover{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink);background:#FBFAFF;}
  .option:active{transform:translate(4px,4px);box-shadow:none;}
  .option:focus-visible{outline:3px solid var(--indigo);outline-offset:3px;}

  .result-card{text-align:center;position:relative;overflow:hidden;animation:pop .5s cubic-bezier(.2,1.2,.4,1) both;}
  @keyframes pop{0%{opacity:0;transform:scale(.8) rotate(-3deg)}100%{opacity:1;transform:none}}
  .rarity{position:absolute;top:14px;right:14px;transform:rotate(8deg);font-weight:800;font-size:.8rem;letter-spacing:.04em;border:2px solid var(--ink);border-radius:10px;padding:6px 10px;background:var(--yellow);}
  .face{width:150px;height:150px;margin:8px auto 18px;border:3px solid var(--ink);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:4.4rem;background:#fff;box-shadow:var(--shadow-sm);overflow:hidden;}
  .face img{width:100%;height:100%;object-fit:cover;}
  .result-kicker{font-weight:700;text-transform:uppercase;letter-spacing:.12em;font-size:.78rem;color:var(--indigo);margin-bottom:6px;}
  .result-name{font-family:'Unbounded',sans-serif;font-weight:900;font-size:1.9rem;line-height:1.05;margin-bottom:14px;}
  .result-desc{font-size:1.05rem;line-height:1.55;color:#3b3650;max-width:44ch;margin:0 auto;}
  .pct-line{margin-top:18px;font-weight:700;min-height:1.4em;}
  .pct-line b{color:var(--coral);}

  .stats-head{margin-bottom:6px;font-family:'Unbounded',sans-serif;font-weight:800;font-size:1.5rem;}
  .stats-note{color:#5a5470;font-size:.92rem;margin-bottom:22px;line-height:1.45;}
  .stat-row{margin-bottom:14px;}
  .stat-label{display:flex;justify-content:space-between;align-items:baseline;font-weight:700;margin-bottom:6px;font-size:.95rem;}
  .stat-label .emo{margin-right:6px;}
  .stat-label .v{font-variant-numeric:tabular-nums;}
  .track{height:16px;border:3px solid var(--ink);border-radius:999px;background:#fff;overflow:hidden;}
  .track > span{display:block;height:100%;border-radius:999px;width:0;transition:width .6s cubic-bezier(.2,.8,.3,1);}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-weight:600;padding:12px 20px;border-radius:999px;opacity:0;pointer-events:none;transition:opacity .25s ease,transform .25s ease;z-index:50;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .foot{text-align:center;margin-top:22px;font-size:.82rem;color:#6b6685;}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
  <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>

  <div class="stage">
    <section id="screen-start" class="screen active">
      <div class="panel">
        <span class="eyebrow">Тест · 11 питань</span>
        <h1>Який ти мем?</h1>
        <p class="lead">Дізнайся, який із 31 мема - це сьогодні ти. В кінці - твій результат і статистика по всіх мемах.</p>
        <button class="btn btn-primary" id="startBtn">Почати тест →</button>
      </div>
      <p class="foot">31 мем · 31 можливий результат</p>
    </section>

    <section id="screen-quiz" class="screen">
      <div class="quiz-top">
        <button class="iconbtn" id="backBtn" aria-label="Назад">←</button>
        <span class="counter" id="counter">1 / 11</span>
        <div class="bar"><div class="bar-fill" id="barFill"></div></div>
      </div>
      <div class="panel">
        <p class="question" id="questionText"></p>
        <div class="options" id="optionsBox"></div>
      </div>
    </section>

    <section id="screen-result" class="screen">
      <div class="panel result-card">
        <span class="rarity" id="rarityBadge"></span>
        <div class="face" id="resultFace"></div>
        <p class="result-kicker">Твій мем</p>
        <h2 class="result-name" id="resultName"></h2>
        <p class="result-desc" id="resultDesc"></p>
        <p class="pct-line" id="pctLine"></p>
      </div>
      <div class="btn-row">
        <button class="btn" id="shareBtn">Поділитися</button>
        <button class="btn" id="statsBtn">Усі меми</button>
        <button class="btn" id="againBtn">Ще раз</button>
      </div>
    </section>

    <section id="screen-stats" class="screen">
      <div class="panel">
        <h2 class="stats-head" id="statsHead">Статистика по мемах</h2>
        <p class="stats-note" id="statsNote"></p>
        <div id="statsBox"></div>
      </div>
      <div class="btn-row"><button class="btn btn-primary" id="restartFromStats">Пройти тест</button></div>
    </section>
  </div>

  <div class="toast" id="toast"></div>

<script>
/* ============================================================

   Поки файлу нема - показується емодзі (запасний варіант).
   ============================================================ */

  { id:"burn_work", emoji:"🔨", color:"#FF5470", img:"IMG_0361.jpeg",
    name:"«Спалю цю роботу»", desc:"Терпець луснув - хочеться все рознести молотком, поки воно горить. Втома й лють перемкнули тебе в режим хаосу." },
  { id:"bite_laptop", emoji:"⌨️", color:"#FF7A45", img:"IMG_0344.jpeg",
    name:"«Зʼїм цю техніку»", desc:"Баги, лаги, дедлайни - і ти готовий(а) вкусити ноутбук. Гаджети тебе сьогодні офіційно перемогли." },
  { id:"go_flow_sea", emoji:"🌊", color:"#2DA8E0", img:"IMG_0353.jpeg",

  { id:"goldfish", emoji:"🐠", color:"#FFB23E", img:"IMG_0359.jpeg",
    name:"«Памʼятаю, аякже»", desc:"Памʼять як у золотої рибки, але впевненість - як у профі. Що там треба було? А, неважливо." },
  { id:"nervous_dog", emoji:"😰", color:"#6B7280", img:"IMG_0354.jpeg",
    name:"«Усі системи нервові»", desc:"Тривога - твоє паливо. Ти тримаєшся, але всі внутрішні системи давно на межі." },
  { id:"crying_kid", emoji:"😭", color:"#4F8DF0", img:"IMG_0337.jpeg",
    name:"«Все, я плачу»", desc:"Емоції через край і завжди напоготові. Маленький драматичний шторм у людському тілі." },
  { id:"math_lady", emoji:"🧮", color:"#C026D3", img:"IMG_0342.jpeg",

  { id:"self_care", emoji:"🤍", color:"#F472B6", img:"IMG_0345.jpeg",

  { id:"sunset_dog", emoji:"🌅", color:"#E07A3F", img:"IMG_0338.jpeg",
    name:"«У роздумах про вічне»", desc:"Незворушний мислитель на заході сонця. Дивишся вдалечінь і відчуваєш, що ти - головний герой свого фільму." },
  { id:"overthink_shark", emoji:"🦈", color:"#5B5FEF", img:"IMG_0357.jpeg",

  { id:"roll_safe", emoji:"🤙", color:"#FFC93C", img:"IMG_0349.jpeg",
    name:"«Хитрий розум»", desc:"На кожну ситуацію - свій лайфхак. Самовпевнена логіка, яка майже завжди здається геніальною." },
  { id:"fruit_glutton", emoji:"🍉", color:"#E63950", img:"IMG_0400.JPG",
    name:"«Дорвався до фруктів»", desc:"Сезон стартував - і ти накупив(ла) цілу гору фруктів. Наївся(лася) вже від душі, але спинитися не можеш: ще шматочок кавуна, ну і ще один." },
  { id:"conspiracy", emoji:"🕵️", color:"#8B5CF6", img:"IMG_0341.jpeg",
    name:"«Все повʼязано!»", desc:"Бачиш звʼязки там, де їх не бачить ніхто. Стіна з ниток, теорії, режим детектива на повну." },
  { id:"hackerman", emoji:"💻", color:"#22C55E", img:"IMG_0340.jpeg",
    name:"«Я в системі»", desc:"Технічний геній (на словах). Тицяєш кнопки впевнено, ніби зараз зламаєш весь інтернет." },

  { id:"degree_hamster", emoji:"🐹", color:"#A78BFA", img:"IMG_0360.jpeg",

    name:"«Маленький бешкетник»", desc:"Завжди щось замислив(ла). Пустотлива енергія й погляд людини, яка собі на умі." },
  { id:"confused_paper", emoji:"😵‍💫", color:"#EF4444", img:"IMG_0350.jpeg",
    name:"«Що це взагалі таке?»", desc:"Нічого не розумієш - і тебе це вже бісить. Мружишся на світ із праведним обуренням." },

/* ============================================================
   3) ЛОГІКА
   ============================================================ */
const $ = s => document.querySelector(s);
const memeById = id => MEMES.find(m => m.id === id);
let current = 0, answers = [], shownWinner = null;

/* Теоретичний розподіл (запасний варіант + рідкісність).
   Детермінований ГВЧ - стабільні числа, але оновлюються,
   якщо ти зміниш питання чи бали. */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return ((t^t>>>14)>>>0)/4294967296;};}
function computeDistribution(){
  const rng = mulberry32(20240613);
  const counts = {}; MEMES.forEach(m => counts[m.id] = 0);
  const N = 80000;
  for (let i = 0; i < N; i++){
    const scores = {}; MEMES.forEach(m => scores[m.id] = 0);
    for (let q = 0; q < QUESTIONS.length; q++){
      const opts = QUESTIONS[q].options;
      const opt = opts[Math.floor(rng() * opts.length)];
      for (const id in opt.scores) scores[id] += opt.scores[id];
    }
    let max = -Infinity;
    for (const id in scores) if (scores[id] > max) max = scores[id];
    const winners = MEMES.filter(m => scores[m.id] === max);
    counts[winners[Math.floor(rng() * winners.length)].id]++;
  }
  const pct = {}; MEMES.forEach(m => pct[m.id] = counts[m.id] / N * 100);
  return pct;
}
const DIST = computeDistribution();

/* Відсотки беремо з прорахованого (теоретичного) розподілу. */
function statFor(id){ return { pct: DIST[id] }; }

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  $("#" + id).classList.add("active");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function renderQuestion(){
  const Q = QUESTIONS[current];
  $("#counter").textContent = (current + 1) + " / " + QUESTIONS.length;
  $("#barFill").style.width = (current / QUESTIONS.length * 100) + "%";
  $("#questionText").textContent = Q.q;
  $("#backBtn").hidden = (current === 0);
  const box = $("#optionsBox"); box.innerHTML = "";
  Q.options.forEach((opt, i) => {
    const b = document.createElement("button");
    b.className = "option";
    b.innerHTML = '<span class="emo">' + opt.emo + '</span><span>' + opt.label + '</span>';
    b.addEventListener("click", () => selectOption(i));
    box.appendChild(b);
  });
}

function selectOption(i){
  answers[current] = i;
  if (current < QUESTIONS.length - 1){ current++; renderQuestion(); }
  else { $("#barFill").style.width = "100%"; finish(); }
}
function goBack(){ if (current > 0){ current--; renderQuestion(); } }

function finish(){
  const scores = {}; MEMES.forEach(m => scores[m.id] = 0);
  answers.forEach((optIndex, q) => {
    const opt = QUESTIONS[q].options[optIndex];
    for (const id in opt.scores) scores[id] += opt.scores[id];
  });
  let max = -Infinity;
  for (const id in scores) if (scores[id] > max) max = scores[id];
  const winners = Object.keys(scores).filter(id => scores[id] === max);
  const winnerId = winners[Math.floor(Math.random() * winners.length)];
  renderResult(winnerId);
  showScreen("screen-result");
}

function paintPct(id){
  $("#pctLine").innerHTML = "Цей мем випадає приблизно у <b>" + statFor(id).pct.toFixed(1) + "%</b> випадків";
}

function renderResult(id){
  const m = memeById(id);
  shownWinner = id;
  const face = $("#resultFace");
  face.style.background = m.color + "22";
  if (m.img) face.innerHTML = '<img src="' + m.img + '" alt="" onerror="this.parentNode.textContent=\'' + m.emoji + '\'">';
  else face.textContent = m.emoji;
  $("#resultName").textContent = m.name;
  $("#resultDesc").textContent = m.desc;
  // Рідкісність - за збалансованим (теоретичним) розподілом, щоб не стрибала.
  const t = DIST[id];
  $("#rarityBadge").textContent = t < 2.5 ? "🌟 Рідкісний" : (t < 4 ? "Незвичайний" : "Класика");
  paintPct(id);
}

function openStats(){
  renderStats();
  showScreen("screen-stats");
}

function renderStats(){
  $("#statsHead").textContent = "Як часто випадає кожен мем";
  $("#statsNote").textContent = "Розраховано на основі багатьох симуляцій випадкових проходжень - показує, наскільки збалансований тест і які меми рідкісні.";
  const rows = MEMES.map(m => ({ m, pct: statFor(m.id).pct })).sort((a, b) => b.pct - a.pct);
  const maxPct = Math.max(...rows.map(r => r.pct), 0.01);
  const box = $("#statsBox"); box.innerHTML = "";
  rows.forEach(({ m, pct }) => {
    const row = document.createElement("div");
    row.className = "stat-row";
    row.innerHTML =
      '<div class="stat-label"><span><span class="emo">' + m.emoji + '</span>' + m.name + '</span>' +
      '<span class="v">' + pct.toFixed(1) + '%</span></div>' +
      '<div class="track"><span style="background:' + m.color + '"></span></div>';
    box.appendChild(row);
    requestAnimationFrame(() => { row.querySelector(".track > span").style.width = (pct / maxPct * 100) + "%"; });
  });
}

function shareResult(){
  const m = memeById(shownWinner);
  const text = "Я пройшов(ла) тест і я - " + m.name + "! А ти який мем?";
  const url = location.href;
  if (navigator.share){ navigator.share({ title: "Який ти мем?", text, url }).catch(() => {}); }
  else { navigator.clipboard.writeText(text + " " + url).then(() => toast("Скопійовано - можна вставляти!")).catch(() => toast(text)); }
}

let toastTimer;
function toast(msg){
  const t = $("#toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
}

function restart(){ current = 0; answers = []; shownWinner = null; renderQuestion(); showScreen("screen-quiz"); }

$("#startBtn").addEventListener("click", restart);
$("#againBtn").addEventListener("click", restart);
$("#restartFromStats").addEventListener("click", restart);
$("#backBtn").addEventListener("click", goBack);
$("#shareBtn").addEventListener("click", shareResult);
$("#statsBtn").addEventListener("click", openStats);
</script>
